title: Credential Dumping Indicators
id: DET-002
status: experimental
description: Detects common signs of credential dumping activity, including access to LSASS-related tooling or suspicious command lines.

log_source:
  product: windows
  service: sysmon

detection:
  selection:
    Image|contains:
      - "procdump"
      - "rundll32"
      - "comsvcs.dll"
      - "mimikatz"
    CommandLine|contains:
      - "lsass"
      - "sekurlsa"
      - "MiniDump"
  condition: selection

false_positives:
  - Authorized memory dump activity for troubleshooting
  - Approved security testing
  - Incident response collection

triage:
  - Identify initiating user
  - Validate whether the host is under active investigation
  - Check for privilege escalation before execution
  - Review file creation and outbound transfer activity

severity: critical

mitre:
  tactic: credential-access
  technique: T1003
